<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>像素贪吃蛇</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1c2e;
      font-family: "Courier New", Consolas, monospace;
      color: #94a3b8;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: normal;
      letter-spacing: 2px;
      color: #38b764;
      text-shadow: 2px 2px 0 #0d2818;
    }
    #wrap {
      padding: 12px;
      background: #0f0f1a;
      border: 4px solid #3a4466;
      box-shadow:
        inset 0 0 0 2px #1a1c2e,
        4px 4px 0 #000;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    p {
      margin: 12px 0 0;
      font-size: 11px;
      text-align: center;
      max-width: 360px;
      line-height: 1.5;
    }
    kbd {
      display: inline-block;
      padding: 1px 5px;
      border: 1px solid #3a4466;
      background: #0f0f1a;
      color: #a7f3d0;
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="wrap">
    <canvas id="c" width="320" height="320"></canvas>
  </div>
  <p>方向键移动 · 吃到红块变长 · 撞墙或撞到自己后，再按一次方向键重新开始</p>
  <script>
    (function () {
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;

      const CELL = 16;
      const W = canvas.width / CELL;
      const H = canvas.height / CELL;

      const COL = {
        bg: "#1a1c2e",
        grid: "#252a3f",
        snake: "#38b764",
        snakeHead: "#6dfc8a",
        food: "#ff0044",
        dead: "#5c5f72",
      };

      let snake, dir, nextDir, food, alive, tick;

      function randCell() {
        return {
          x: Math.floor(Math.random() * W),
          y: Math.floor(Math.random() * H),
        };
      }

      function spawnFood() {
        let p;
        do {
          p = randCell();
        } while (snake.some((s) => s.x === p.x && s.y === p.y));
        food = p;
      }

      function reset() {
        const cx = Math.floor(W / 2);
        const cy = Math.floor(H / 2);
        snake = [
          { x: cx, y: cy },
          { x: cx - 1, y: cy },
          { x: cx - 2, y: cy },
        ];
        dir = { x: 1, y: 0 };
        nextDir = { ...dir };
        alive = true;
        tick = 0;
        spawnFood();
      }

      function drawCell(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
      }

      function draw() {
        ctx.fillStyle = COL.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let x = 0; x < W; x++) {
          for (let y = 0; y < H; y++) {
            ctx.fillStyle = COL.grid;
            ctx.fillRect(x * CELL, y * CELL, 1, 1);
          }
        }

        drawCell(food.x, food.y, COL.food);

        const head = snake[0];
        for (let i = 0; i < snake.length; i++) {
          const s = snake[i];
          const c =
            i === 0
              ? alive
                ? COL.snakeHead
                : COL.dead
              : alive
                ? COL.snake
                : COL.dead;
          drawCell(s.x, s.y, c);
        }
      }

      function step() {
        if (!alive) return;

        dir = nextDir;
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        if (head.x < 0 || head.x >= W || head.y < 0 || head.y >= H) {
          alive = false;
          return;
        }
        if (snake.some((s) => s.x === head.x && s.y === head.y)) {
          alive = false;
          return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          spawnFood();
        } else {
          snake.pop();
        }
      }

      document.addEventListener("keydown", (e) => {
        const k = e.key;
        if (k === "ArrowUp" && dir.y === 0) nextDir = { x: 0, y: -1 };
        if (k === "ArrowDown" && dir.y === 0) nextDir = { x: 0, y: 1 };
        if (k === "ArrowLeft" && dir.x === 0) nextDir = { x: -1, y: 0 };
        if (k === "ArrowRight" && dir.x === 0) nextDir = { x: 1, y: 0 };
        if (!alive && ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(k)) {
          reset();
        }
        e.preventDefault();
      });

      function loop(ts) {
        if (alive) {
          tick += ts - (loop.prev || ts);
          loop.prev = ts;
          while (tick > 110) {
            tick -= 110;
            step();
          }
        } else {
          loop.prev = ts;
        }
        draw();
        requestAnimationFrame(loop);
      }

      reset();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
